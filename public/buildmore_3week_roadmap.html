<style>
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --color-text-primary: #171717;
  --color-text-secondary: #525252;
  --color-text-tertiary: #8a8a8a;
  --color-background-secondary: #fafafa;
  --color-border-secondary: #e5e5e5;
  --color-border-tertiary: #eeeeee;
  --border-radius-lg: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.phase-label { font-size: 11px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; color: var(--color-text-tertiary); margin: 1.25rem 0 .5rem; }
.week-header { display: grid; grid-template-columns: 180px repeat(21, 1fr); gap: 0; margin-bottom: 4px; }
.wh-empty { }
.wh-day { font-size: 10px; color: var(--color-text-tertiary); text-align: center; padding: 2px 0; }
.wh-day.weekend { color: var(--color-text-tertiary); opacity: .45; }
.wh-week { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); grid-column: span 7; text-align: center; padding-bottom: 4px; border-bottom: 1px solid var(--color-border-tertiary); margin-bottom: 4px; }
.gantt { display: flex; flex-direction: column; gap: 3px; }
.row { display: grid; grid-template-columns: 180px repeat(21, 1fr); align-items: center; min-height: 28px; }
.row:hover { background: var(--color-background-secondary); border-radius: 6px; }
.task-label { font-size: 12px; color: var(--color-text-primary); padding: 0 8px 0 0; line-height: 1.3; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.idx { font-size: 10px; font-weight: 500; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 1px 5px; color: var(--color-text-secondary); flex-shrink: 0; min-width: 24px; text-align: center; }
.bar-cell { position: relative; height: 28px; display: flex; align-items: center; }
.bar { height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: flex-start; padding: 0 6px; font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; cursor: pointer; transition: opacity .15s; position: absolute; }
.bar:hover { opacity: .8; }
.sep { border-left: 1px dashed var(--color-border-tertiary); height: 100%; position: absolute; top: 0; }
.week-sep { border-left: 1px solid var(--color-border-secondary); }
.detail-panel { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-top: 1rem; display: none; }
.detail-panel.open { display: block; }
.detail-title { font-size: 14px; font-weight: 500; margin-bottom: .5rem; color: var(--color-text-primary); }
.detail-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.65; }
.detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: .75rem; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.grid-line { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
@media (max-width: 768px) {
  body { min-width: 0; overflow-x: hidden; background: #fff; }
  .wrap { padding: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .legend { gap: 8px 10px; margin-bottom: 14px; }
  .leg { font-size: 11px; }
  .week-header, .row { grid-template-columns: 132px repeat(21, 32px); min-width: 804px; }
  .task-label { font-size: 11px; padding-right: 6px; }
  .idx { min-width: 22px; padding: 1px 4px; }
  .bar { height: 20px; font-size: 9px; padding: 0 5px; }
  .detail-panel { min-width: 0; margin-top: 12px; }
}

const phaseStarts = [0,3,7,14,17];

function renderGantt() {
  const g = document.getElementById('gantt');
  let lastPhase = '';
  tasks.forEach(t => {
    if (t.phase && t.phase !== lastPhase) {
      const ph = document.createElement('div');
      ph.className = 'phase-label';
      ph.textContent = t.phase;
      g.appendChild(ph);
      lastPhase = t.phase;
    }
    const row = document.createElement('div');
    row.className = 'row';
    const lbl = document.createElement('div');
    lbl.className = 'task-label';
    lbl.innerHTML = `<span class="idx">${t.id}</span><span>${t.label}</span>`;
    lbl.onclick = () => showDetail(t);
    row.appendChild(lbl);

    for (let i = 0; i < COLS; i++) {
      const cell = document.createElement('div');
      cell.className = 'bar-cell';
      cell.style.position = 'relative';
      if ([7,14].includes(i)) {
        const sep = document.createElement('div');
        sep.style.cssText = 'position:absolute;left:0;top:0;bottom:0;width:1px;background:var(--color-border-secondary);pointer-events:none;';
        cell.appendChild(sep);
      }
      if ([5,6,12,13,19,20].includes(i)) {
        cell.style.opacity = '0.4';
      }
      if (i === t.start) {
        const bar = document.createElement('div');
        const w = t.dur;
        bar.className = 'bar';
        bar.style.cssText = `background:${t.color};color:${t.textColor};left:2px;right:${-(w-1)*100}%;width:calc(${w * 100}% - 4px);z-index:2;`;
        bar.textContent = t.id;
        bar.onclick = () => showDetail(t);
        cell.appendChild(bar);
      }
      row.appendChild(cell);
    }
    g.appendChild(row);
  });
}

  const textMap = { '#7F77DD':'#3C3489','#1D9E75':'#085041','#378ADD':'#0C447C','#EF9F27':'#633806','#E24B4A':'#791F1F' };
  panel.style.borderColor = t.color;
  title.innerHTML = `<span style="background:${t.color};color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;margin-right:8px;">${t.id}</span>${t.label}`;
  body.textContent = t.desc;
  tags.innerHTML = t.tags.map(tag => `<span class="tag" style="background:${colorMap[t.color]};color:${textMap[t.color]}">${tag}</span>`).join('');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

renderGantt();
</script>

</body>
</html>
